<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>Toast All Day - Award-Winning Breakfast, Brunch & Lunch in Charleston</title>
    <meta name="description" content="Toast All Day serves gourmet breakfast, brunch, and lunch with fresh, locally-sourced ingredients. TripAdvisor Top 25 Best Brunches in the U.S. Visit our Charleston, Mt. Pleasant, Summerville & Savannah locations." />
    <meta name="keywords" content="breakfast Charleston, brunch Charleston, lunch Mt Pleasant, best brunch Savannah, award winning breakfast, mimosas, french toast, eggs benedict, pancakes, waffles" />
    <meta name="author" content="Toast All Day" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://toastallday.com/" />
    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin>
    <!-- Preload the true LCP image (hero poster). Static /public paths so
         the preload scanner can discover them before the JS bundle runs.
         Mobile gets the small AVIF, larger viewports get the desktop AVIF. -->
    <link
      rel="preload"
      as="image"
      href="/hero/hero-poster.avif"
      type="image/avif"
      media="(min-width: 768px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="/hero/hero-cheers-mobile-sm.avif"
      type="image/avif"
      media="(max-width: 767px)"
      fetchpriority="high"
    />
    <!-- Preload only the primary body/nav weight (400). The bold (800)
         weight loads on demand from the inlined @font-face below. The
         CDN's own CSS is skipped entirely — it lacks font-display:swap
         and adds an extra render-blocking request hop. -->
    <link
      rel="preload"
      as="font"
      type="font/woff"
      href="https://fonts.cdnfonts.com/s/106028/TelegrafRegular_272984568a25d8528fe2de8b20b29011.woff"
      crossorigin
    />
    <style>
      @font-face {
        font-family: 'Telegraf';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: local('Telegraf'),
          url('https://fonts.cdnfonts.com/s/106028/TelegrafRegular_272984568a25d8528fe2de8b20b29011.woff') format('woff');
      }
      @font-face {
        font-family: 'Telegraf';
        font-style: normal;
        font-weight: 800;
        font-display: swap;
        src: local('Telegraf'),
          url('https://fonts.cdnfonts.com/s/106028/Telegraf%20UltraBold%20800.woff') format('woff');
      }
    </style>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://toastallday.com/" />
    <meta property="og:title" content="Toast All Day - Award-Winning Breakfast, Brunch & Lunch" />
    <meta property="og:description" content="TripAdvisor Top 25 Best Brunches in the U.S. Fresh, locally-sourced ingredients. Locations in Charleston, Mt. Pleasant, Summerville & Savannah." />
    <meta property="og:image" content="https://toastallday.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Toast All Day" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://toastallday.com/" />
    <meta name="twitter:title" content="Toast All Day - Award-Winning Breakfast, Brunch & Lunch" />
    <meta name="twitter:description" content="TripAdvisor Top 25 Best Brunches in the U.S. Fresh, locally-sourced ingredients." />
    <meta name="twitter:image" content="https://toastallday.com/og-image.jpg" />

    <!-- Additional SEO -->
    <meta name="theme-color" content="#2d5a27" />
    <meta name="geo.region" content="US-SC" />
    <meta name="geo.placename" content="Charleston" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Defer third-party scripts until the browser is idle to keep main-thread free during initial paint -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      var loadThirdParty = function () {
        // Google Analytics
        var ga = document.createElement('script');
        ga.async = true;
        ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-TN04NYKSTP';
        document.head.appendChild(ga);
        gtag('config', 'G-TN04NYKSTP');

        // PX Grabber Lead Tracking
        if (!document.getElementById('px-grabber')) {
          var px = document.createElement('script');
          px.id = 'px-grabber';
          px.src = 'https://leads.goagency.com/px.min.js';
          px.type = 'text/javascript';
          px.onload = function () {
            if (window.PxGrabber) {
              PxGrabber.setOptions({ Label: '84452230|' + window.location.href });
              PxGrabber.render();
            }
          };
          document.head.appendChild(px);
        }
      };
      window.addEventListener('load', function () {
        setTimeout(loadThirdParty, 12000);
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
